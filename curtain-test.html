<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curtain Test</title>
<style>
body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
#log { background: #111; padding: 12px; border-radius: 8px; font-size: 12px; font-family: monospace; white-space: pre-wrap; }
button { padding: 12px 24px; background: #ff6a2c; border: none; color: #fff; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 8px 4px; display: block; width: 100%; }
</style>
</head>
<body>
<h2>Curtain Debug</h2>
<button onclick="checkHeaders()">1. Check Content-Type header</button>
<button onclick="testVideo()">2. Test video element</button>
<button onclick="testBase64()">3. Test with inline base64 MP4</button>
<div id="log">Tap buttons above...</div>

<script>
const URL = 'https://sioalvawzayfphwzqctq.supabase.co/storage/v1/object/public/challenge-media/curtain.mp4';
const log = document.getElementById('log');
function addLog(msg) { log.textContent += '\n' + msg; }

async function checkHeaders() {
  addLog('\n--- Checking headers ---');
  try {
    const r = await fetch(URL, { method: 'HEAD' });
    addLog('Status: ' + r.status);
    addLog('Content-Type: ' + r.headers.get('content-type'));
    addLog('Content-Length: ' + r.headers.get('content-length'));
    addLog('Accept-Ranges: ' + r.headers.get('accept-ranges'));
  } catch(e) { addLog('Fetch error: ' + e.message); }
}

function testVideo() {
  addLog('\n--- Testing video element ---');
  const v = document.createElement('video');
  v.muted = true;
  v.playsInline = true;
  v.preload = 'auto';
  v.style.cssText = 'width:100%;max-height:200px;display:block;margin-top:10px;background:#333';
  v.src = URL;
  document.body.appendChild(v);
  v.addEventListener('loadedmetadata', () => addLog('loadedmetadata: duration=' + v.duration));
  v.addEventListener('canplay', () => addLog('canplay'));
  v.addEventListener('playing', () => addLog('PLAYING ✓'));
  v.addEventListener('error', () => addLog('ERROR code=' + v.error?.code + ' msg=' + v.error?.message));
  const p = v.play();
  if (p) p.then(() => addLog('play() resolved')).catch(e => addLog('play() rejected: ' + e.message));
}

// Tiny valid H.264 MP4 (4-frame 2x2 black video) — tests if video element itself works
function testBase64() {
  addLog('\n--- Testing inline base64 H.264 ---');
  const v = document.createElement('video');
  v.muted = true; v.playsInline = true;
  v.style.cssText = 'width:100%;max-height:60px;display:block;margin-top:8px;background:#333';
  // Minimal valid MP4 (ftyp+moov+mdat)
  v.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAA5FtZGF0AAACrGxpYmZhYWMgMS4yOC4wIGh0dHBzOi8vd3d3LmZmb3BlbHNzLm9yZy9saWJmYWFjAAAADGZyZWUAAAAIbWRhdA==';
  v.addEventListener('error', () => addLog('base64 error code=' + v.error?.code));
  v.addEventListener('canplay', () => addLog('base64 canplay ✓ — video element works'));
  v.play().catch(() => {});
  document.body.appendChild(v);
}
</script>
</body>
</html>
