<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curtain Test v3</title>
<style>
body { background:#000;color:#fff;font-family:sans-serif;padding:16px; }
#log { background:#111;padding:12px;border-radius:8px;font-size:12px;font-family:monospace;white-space:pre-wrap;margin-top:12px; }
button { padding:12px;background:#ff6a2c;border:none;color:#fff;border-radius:8px;font-size:15px;cursor:pointer;margin:4px 0;display:block;width:100%; }
video { width:100%;display:block;margin-top:8px;background:#333;border-radius:8px; }
</style>
</head>
<body>
<h2>Curtain Test v3</h2>
<button onclick="test1()">1. Fetch first 4 bytes (confirm file exists)</button>
<button onclick="test2()">2. Play video (tap = user gesture)</button>
<button onclick="test3()">3. Open video URL directly in browser</button>
<div id="log">Ready...</div>
<script>
const MP4 = 'https://sioalvawzayfphwzqctq.supabase.co/storage/v1/object/public/challenge-media/curtain.mp4';
const log = document.getElementById('log');
function L(m){ log.textContent += '\n'+m; }

async function test1(){
  L('\n--- GET first bytes ---');
  try {
    const r = await fetch(MP4, {headers:{Range:'bytes=0-3'}});
    L('Status: '+r.status);
    L('Content-Type: '+r.headers.get('content-type'));
    const buf = await r.arrayBuffer();
    const bytes = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join(' ');
    L('First bytes: '+bytes);
    // MP4 magic: bytes 4-7 should be 'ftyp' = 66 74 79 70
    L(bytes.includes('66 74 79 70') ? '✓ Valid MP4 (ftyp found)' : '✗ Not a valid MP4');
  } catch(e){ L('Error: '+e.message); }
}

function test2(){
  L('\n--- Video element (user gesture context) ---');
  const v = document.createElement('video');
  v.muted=true; v.playsInline=true; v.controls=true; v.preload='auto';
  v.src = MP4;
  v.addEventListener('loadedmetadata', ()=>L('loadedmetadata ✓ duration='+v.duration));
  v.addEventListener('playing', ()=>L('PLAYING ✓ — video works!'));
  v.addEventListener('error', ()=>L('ERROR code='+v.error?.code));
  document.body.appendChild(v);
  v.play().then(()=>L('play() OK')).catch(e=>L('play() failed: '+e.message));
}

function test3(){
  window.open(MP4, '_blank');
}
</script>
</body>
</html>
