<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlamesChallenge — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --flame-orange: #E8521A;
    --flame-red: #C13A0F;
    --flame-amber: #F5820A;
    --dark-bg: #111010;
    --card-bg: #1A1918;
    --card-border: #2A2826;
    --text-primary: #F0EDE8;
    --text-muted: #7A7570;
    --text-label: #9A9590;
    --input-bg: #222120;
    --input-border: #333130;
    --input-focus: #E8521A;
  }

  html, body {
    height: 100%;
    background: var(--dark-bg);
    font-family: 'Barlow', sans-serif;
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 16px;
    position: relative;
    overflow: hidden;
  }

  /* Ambient ember glow background */
  body::before {
    content: '';
    position: fixed;
    bottom: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse at center, rgba(232,82,26,0.12) 0%, rgba(193,58,15,0.06) 40%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    top: -100px;
    right: -100px;
    width: 300px;
    height: 300px;
    background: radial-gradient(ellipse at center, rgba(245,130,10,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 32px 36px 28px;
    box-shadow: 
      0 0 0 1px rgba(255,255,255,0.03),
      0 24px 64px rgba(0,0,0,0.6),
      0 0 40px rgba(232,82,26,0.06);
  }

  /* Logo */
  .logo-wrap {
    text-align: center;
    margin-bottom: 8px;
  }

  .logo-wrap img {
    height: auto;
    width: 100%;
    max-width: 320px;
    object-fit: contain;
    filter: drop-shadow(0 2px 16px rgba(232,82,26,0.4));
  }

  /* Tab toggle */
  .tab-toggle {
    display: flex;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    padding: 3px;
    margin-bottom: 28px;
  }

  .tab-btn {
    flex: 1;
    padding: 9px 0;
    border: none;
    border-radius: 6px;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .tab-btn.active {
    background: var(--flame-orange);
    color: #fff;
    box-shadow: 0 2px 8px rgba(232,82,26,0.4);
  }

  .tab-btn:not(.active):hover {
    color: var(--text-primary);
  }

  /* Form */
  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-label);
    margin-bottom: 7px;
  }

  .input-wrap {
    position: relative;
  }

  .form-input {
    width: 100%;
    padding: 12px 14px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    font-weight: 400;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    -webkit-appearance: none;
  }

  .form-input:-webkit-autofill,
  .form-input:-webkit-autofill:hover,
  .form-input:-webkit-autofill:focus {
    -webkit-box-shadow: 0 0 0px 1000px var(--input-bg) inset;
    -webkit-text-fill-color: var(--text-primary);
    border-color: var(--input-border);
    transition: background-color 5000s ease-in-out 0s;
  }

  .form-input::placeholder {
    color: #3A3835;
  }

  .form-input:focus {
    border-color: var(--flame-orange);
    box-shadow: 0 0 0 3px rgba(232,82,26,0.12);
  }

  .form-input.has-toggle {
    padding-right: 44px;
  }

  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    padding: 4px;
    display: flex;
    align-items: center;
    transition: color 0.2s;
  }

  .toggle-pw:hover {
    color: var(--text-primary);
  }

  /* Forgot password */
  .forgot-row {
    text-align: right;
    margin-top: -10px;
    margin-bottom: 24px;
  }

  .forgot-link {
    font-size: 13px;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }

  .forgot-link:hover {
    color: var(--flame-orange);
  }

  /* Submit button */
  .submit-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--flame-orange) 0%, var(--flame-red) 100%);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 16px rgba(232,82,26,0.35);
  }

  .submit-btn::after {
    content: '→';
    margin-left: 8px;
    font-weight: 400;
    letter-spacing: 0;
  }

  .submit-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(232,82,26,0.45);
  }

  .submit-btn:active {
    transform: translateY(0);
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--card-border);
  }

  .divider-text {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  /* Social */
  .social-btn {
    width: 100%;
    padding: 12px;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: border-color 0.2s, background 0.2s;
    text-decoration: none;
  }

  .social-btn:hover {
    border-color: #444;
    background: #252422;
  }

  .social-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  /* Tagline */
  .tagline {
    text-align: center;
    margin-top: 16px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #3A3835;
  }

  .tagline span {
    color: var(--flame-orange);
    opacity: 0.7;
  }

  /* Animate in */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .login-card {
    animation: fadeUp 0.4s ease forwards;
  }

  @media (max-width: 440px) {
    .login-card {
      padding: 32px 24px 28px;
      border-radius: 12px;
    }
  }
</style>
</head>
<body>

<div class="login-card">

  <div class="logo-wrap">
    <img src="https://sioalvawzayfphwzqctq.supabase.co/storage/v1/object/public/challenge-media/Assets/logo.png" alt="FlamesChallenge" />
  </div>

  <div class="tab-toggle">
    <button class="tab-btn active" onclick="setTab(this, 'login')">Log in</button>
    <button class="tab-btn" onclick="setTab(this, 'signup')">Sign up</button>
  </div>

  <form id="login-form" onsubmit="return false;">
    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <div class="input-wrap">
        <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <input class="form-input has-toggle" type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="toggle-pw" type="button" onclick="togglePassword()" aria-label="Show password">
          <svg class="social-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="forgot-row">
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <button class="submit-btn" type="submit">Log in</button>
  </form>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">or</span>
    <div class="divider-line"></div>
  </div>

  <a href="#" class="social-btn">
    <svg class="social-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </a>

  <p class="tagline">Where opinions <span>ignite</span></p>

</div>

<script>
  const { createClient } = supabase;
  const _supabase = createClient(
    'https://sioalvawzayfphwzqctq.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpb2FsdmF3emF5ZnBod3pxY3RxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MzMzMDEsImV4cCI6MjA5NTQwOTMwMX0.XHztB-ubnW2coINCE6e5q6xGVDFC1vh_Ur2eu2gzXXE'
  );

  let currentTab = 'login';

  function setTab(btn, tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const submitBtn = document.querySelector('.submit-btn');
    submitBtn.innerHTML = tab === 'login' ? 'Log in <span style="margin-left:4px;font-weight:300">→</span>' : 'Create account <span style="margin-left:4px;font-weight:300">→</span>';
    document.getElementById('password').autocomplete = tab === 'login' ? 'current-password' : 'new-password';
    document.querySelector('.forgot-row').style.display = tab === 'login' ? 'block' : 'none';
    clearError();
  }

  function togglePassword() {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  }

  function showError(msg) {
    let el = document.getElementById('auth-error');
    if (!el) {
      el = document.createElement('p');
      el.id = 'auth-error';
      el.style.cssText = 'color:#E8521A;font-size:13px;margin-bottom:14px;text-align:center;';
      document.querySelector('.submit-btn').before(el);
    }
    el.textContent = msg;
  }

  function clearError() {
    const el = document.getElementById('auth-error');
    if (el) el.textContent = '';
  }

  function setLoading(loading) {
    const btn = document.querySelector('.submit-btn');
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.7' : '1';
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    setLoading(true);

    if (currentTab === 'login') {
      const { error } = await _supabase.auth.signInWithPassword({ email, password });
      if (error) {
        showError(error.message);
        setLoading(false);
      } else {
        window.location.href = '/';
      }
    } else {
      const { error } = await _supabase.auth.signUp({ email, password });
      if (error) {
        showError(error.message);
        setLoading(false);
      } else {
        showError('Check your email to confirm your account.');
        setLoading(false);
      }
    }
  });

  document.querySelector('.social-btn').addEventListener('click', async (e) => {
    e.preventDefault();
    const { error } = await _supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/' }
    });
    if (error) showError(error.message);
  });
</script>

</body>
</html>
