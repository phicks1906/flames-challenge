<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Tour Avatar — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0806; --surface:#16110d; --border:rgba(255,255,255,0.10);
    --text:#f4ece4; --text-dim:#b6a89c;
    --ember:#ff6a2c; --flame:#ff2d1f; --gold:#ffc857;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:'DM Sans',system-ui,sans-serif; color:var(--text);
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(255,90,30,0.14), transparent 60%),
      var(--bg);
    overflow:hidden;
  }

  /* faint mock app behind the tour, so it feels overlaid in-app */
  .mock{position:fixed;inset:0;opacity:0.18;filter:blur(1px);padding:54px 16px;pointer-events:none}
  .mock h1{font-family:'Anton';font-size:26px;margin:0 0 14px;letter-spacing:0.03em}
  .mock .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;height:96px;margin-bottom:12px}
  .mock .nav{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);border-top:1px solid var(--border)}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,0.55);backdrop-filter:blur(2px);z-index:5;transition:opacity .3s}
  .scrim.hidden{opacity:0;pointer-events:none}

  /* ---------- tour dock ---------- */
  .tour{position:fixed;left:0;right:0;bottom:0;z-index:10;padding:0 16px calc(20px + env(safe-area-inset-bottom));
        display:flex;flex-direction:column;align-items:center;transition:transform .35s, opacity .35s}
  .tour.hidden{transform:translateY(120%);opacity:0;pointer-events:none}

  .bubble{
    position:relative;width:100%;max-width:440px;background:var(--surface);
    border:1px solid var(--border);border-radius:20px;padding:18px 18px 16px;
    box-shadow:0 20px 60px -15px rgba(0,0,0,0.8), 0 0 50px -20px rgba(255,90,30,0.4);
    margin-bottom:14px;
  }
  .bubble::after{content:"";position:absolute;left:46px;bottom:-9px;width:18px;height:18px;
    background:var(--surface);border-right:1px solid var(--border);border-bottom:1px solid var(--border);
    transform:rotate(45deg)}
  .bub-name{font-family:'Bricolage Grotesque';font-weight:700;font-size:12px;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--ember);margin-bottom:5px}
  .bub-text{font-size:16px;line-height:1.5;min-height:72px}
  .bub-text .accent{color:var(--gold);font-weight:700}

  .dots{display:flex;gap:6px;margin:14px 0 4px}
  .dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,0.22);transition:all .25s}
  .dot.on{background:var(--ember);width:20px;border-radius:4px}

  .controls{display:flex;gap:10px;width:100%;max-width:440px;margin-top:6px}
  .btn{flex:1;padding:13px;border-radius:100px;font-family:inherit;font-weight:800;font-size:15px;
    border:1px solid var(--border);background:transparent;color:var(--text-dim);cursor:pointer;transition:all .2s}
  .btn.primary{flex:2;border-color:transparent;color:#fff;
    background:linear-gradient(135deg,var(--ember),var(--flame));
    box-shadow:0 8px 22px -8px rgba(255,80,30,0.7)}
  .btn:active{transform:translateY(1px)}
  .skip{position:fixed;top:calc(16px + env(safe-area-inset-top));right:18px;z-index:11;background:none;border:none;
    color:var(--text-dim);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer}

  /* ---------- the mascot (pure CSS flame + face) ---------- */
  .mascot-wrap{position:relative;height:130px;display:flex;align-items:flex-end;justify-content:center;margin-bottom:2px}
  .mascot{position:relative;width:104px;height:124px;transform-origin:50% 100%;animation:bob 2.6s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  .flame{position:absolute;left:50%;bottom:0;width:84px;height:84px;margin-left:-42px;
    background:linear-gradient(to top,var(--flame),var(--ember) 48%,var(--gold) 96%);
    border-radius:0 52% 52% 52%;transform:rotate(45deg);
    box-shadow:0 0 28px -2px rgba(255,90,30,0.6), inset -6px -6px 14px rgba(0,0,0,0.18);
    animation:flick 1.6s ease-in-out infinite}
  @keyframes flick{0%,100%{transform:rotate(45deg) scale(1)}50%{transform:rotate(45deg) scale(1.04,0.98)}}
  .flame-in{position:absolute;left:50%;bottom:10px;width:44px;height:44px;margin-left:-22px;
    background:linear-gradient(to top,var(--ember),var(--gold));
    border-radius:0 52% 52% 52%;transform:rotate(45deg);opacity:0.9}

  .face{position:absolute;left:50%;bottom:24px;width:64px;height:48px;margin-left:-32px;z-index:2}
  .eye{position:absolute;top:6px;width:15px;height:18px;background:#241405;border-radius:50%}
  .eye.l{left:12px}.eye.r{right:12px}
  .eye::after{content:"";position:absolute;top:3px;left:3px;width:5px;height:5px;background:#fff;border-radius:50%}
  .mouth{position:absolute;bottom:4px;left:50%;width:22px;height:11px;margin-left:-11px;
    border:0 solid #241405;border-bottom-width:4px;border-radius:0 0 22px 22px}
  .cheek{position:absolute;top:22px;width:9px;height:6px;background:rgba(255,90,40,0.5);border-radius:50%}
  .cheek.l{left:6px}.cheek.r{right:6px}

  /* a little waving hand */
  .hand{position:absolute;right:-6px;bottom:54px;width:26px;height:26px;border-radius:50%;
    background:linear-gradient(135deg,var(--ember),var(--gold));z-index:3;opacity:0;transform-origin:bottom center}

  /* poses */
  .mascot.wave .hand{opacity:1;animation:wave .7s ease-in-out infinite}
  @keyframes wave{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(22deg)}}
  .mascot.point{animation:lean 2.6s ease-in-out infinite}
  @keyframes lean{0%,100%{transform:rotate(-5deg) translateY(0)}50%{transform:rotate(-5deg) translateY(-7px)}}
  .mascot.celebrate{animation:party .6s ease-in-out infinite}
  @keyframes party{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-14px) scale(1.06)}}
  .spark{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--gold);opacity:0}
  .mascot.celebrate .spark{animation:pop 0.8s ease-out infinite}
  .spark.s1{top:6px;left:6px;animation-delay:0s}
  .spark.s2{top:0;right:14px;animation-delay:.2s}
  .spark.s3{top:26px;right:-2px;animation-delay:.4s}
  @keyframes pop{0%{opacity:0;transform:scale(0)}40%{opacity:1;transform:scale(1.3)}100%{opacity:0;transform:scale(0.6) translateY(-10px)}}

  .replay{position:fixed;left:50%;bottom:40px;transform:translateX(-50%);z-index:10;
    padding:13px 24px;border-radius:100px;border:1px solid var(--border);background:var(--surface);
    color:var(--text);font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;
    display:flex;align-items:center;gap:8px;transition:opacity .3s}
  .replay.hidden{opacity:0;pointer-events:none}
  .note{position:fixed;top:calc(14px + env(safe-area-inset-top));left:16px;z-index:11;font-size:11px;color:var(--text-dim);max-width:60%}
</style>
</head>
<body>
  <div class="note">Preview — placeholder mascot. Eric's art swaps in later.</div>

  <!-- faint mock app behind -->
  <div class="mock">
    <h1>FEED</h1>
    <div class="card"></div><div class="card"></div><div class="card"></div>
    <div class="nav"></div>
  </div>

  <div class="scrim" id="scrim"></div>
  <button class="skip" id="skip">Skip ✕</button>

  <div class="tour" id="tour">
    <div class="mascot-wrap">
      <div class="mascot wave" id="mascot">
        <div class="flame"></div>
        <div class="flame-in"></div>
        <div class="face">
          <div class="eye l"></div><div class="eye r"></div>
          <div class="cheek l"></div><div class="cheek r"></div>
          <div class="mouth"></div>
        </div>
        <div class="hand"></div>
        <div class="spark s1"></div><div class="spark s2"></div><div class="spark s3"></div>
      </div>
    </div>

    <div class="bubble">
      <div class="bub-name" id="bubName">Cinder</div>
      <div class="bub-text" id="bubText"></div>
      <div class="dots" id="dots"></div>
    </div>

    <div class="controls">
      <button class="btn" id="back">Back</button>
      <button class="btn primary" id="next">Next</button>
    </div>
  </div>

  <button class="replay hidden" id="replay">↺ Replay tour</button>

<script>
  const steps = [
    { pose:'wave',      text:`Hey, welcome to <span class="accent">FlamesChallenge</span>! I'm Cinder, your guide. Give me ten seconds and I'll show you how this works.` },
    { pose:'point',     text:`This is <span class="accent">Challenges</span> — the main event. Pick a category, drop your entry, and go head-to-head with everyone else.` },
    { pose:'point',     text:`Then the <span class="accent">community votes</span>. Most votes wins. No judges, no politics — just the people deciding who's got it.` },
    { pose:'point',     text:`Got a hot take? <span class="accent">Polls</span> let you settle debates and see exactly where everyone stands.` },
    { pose:'point',     text:`Win challenges to climb the ranks — <span class="accent">Spark → Flame → Blaze → Inferno</span>. Stack enough championships and you land in the Hall of Fame.` },
    { pose:'celebrate', text:`That's the tour! Now get in there and show 'em what you've got. <span class="accent">Let's go!</span>` },
  ];

  let i = 0;
  const mascot = document.getElementById('mascot');
  const bubText = document.getElementById('bubText');
  const dots = document.getElementById('dots');
  const backBtn = document.getElementById('back');
  const nextBtn = document.getElementById('next');
  const tour = document.getElementById('tour');
  const scrim = document.getElementById('scrim');
  const replay = document.getElementById('replay');

  steps.forEach((_, n) => {
    const d = document.createElement('div'); d.className = 'dot'; d.dataset.n = n; dots.appendChild(d);
  });

  function render() {
    const s = steps[i];
    mascot.className = 'mascot ' + s.pose;
    // fade the text in
    bubText.style.opacity = 0;
    setTimeout(() => { bubText.innerHTML = s.text; bubText.style.transition='opacity .25s'; bubText.style.opacity = 1; }, 120);
    [...dots.children].forEach((d, n) => d.classList.toggle('on', n === i));
    backBtn.style.visibility = i === 0 ? 'hidden' : 'visible';
    nextBtn.textContent = i === steps.length - 1 ? "Let's go! →" : 'Next';
  }

  function finish() {
    tour.classList.add('hidden');
    scrim.classList.add('hidden');
    replay.classList.remove('hidden');
  }
  function start() {
    i = 0; render();
    tour.classList.remove('hidden');
    scrim.classList.remove('hidden');
    replay.classList.add('hidden');
  }

  nextBtn.onclick = () => { if (i < steps.length - 1) { i++; render(); } else { finish(); } };
  backBtn.onclick = () => { if (i > 0) { i--; render(); } };
  document.getElementById('skip').onclick = finish;
  replay.onclick = start;

  render();
</script>
</body>
</html>
